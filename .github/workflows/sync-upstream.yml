name: Sync with Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          # We need to fetch the entire history to properly merge
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/coder/code-server.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for updates
        id: check_updates
        run: |
          # Check if there are new commits on upstream/main that we don't have
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          LOCAL_COMMIT=$(git rev-parse main)
          if [ "$UPSTREAM_COMMIT" != "$LOCAL_COMMIT" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream changes
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          git merge upstream/main --no-edit -m "Merge upstream changes"
          git push origin main

      - name: Handle merge conflicts
        if: failure() && steps.check_updates.outputs.has_updates == 'true'
        run: |
          echo "Merge conflict occurred. Please resolve manually."
          exit 1