name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/mobile-code-server:latest
        
    - name: Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@0.23.0
      with:
        image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/mobile-code-server:latest
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Test container startup
      run: |
        docker run -d --name test-container -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/mobile-code-server:latest
        sleep 30
        curl -f http://localhost:8080 || exit 1
        docker stop test-container
        docker rm test-container