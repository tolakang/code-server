name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build local image for testing
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/Dockerfile
        load: true
        tags: mobile-code-server:test

    - name: Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: mobile-code-server:test
        format: 'table'
        exit-code: '0' # Don't fail the build on vulnerabilities for now
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Test container startup
      run: |
        docker run -d --name test-container -p 8080:8080 mobile-code-server:test
        sleep 30
        curl -f http://localhost:8080/health || (docker logs test-container && exit 1)
        docker stop test-container
        docker rm test-container

    - name: Log in to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.DOCKERHUB_USERNAME != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.DOCKERHUB_USERNAME != ''
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/mobile-code-server:latest
