version: '3.8'

services:
  # Mobile Code Server - Main Application
  mobile-code-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mobile-code-server
    ports:
      - "8080:8080"
    volumes:
      - ./project:/home/coder/project:cached
      - ./data:/home/coder/.local/share/code-server:cached
      - ./config:/home/coder/.config/code-server:cached
      - ./workspace:/home/coder/workspace:cached
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - AUTH_TYPE=${AUTH_TYPE:-none}
      - CODE_SERVER_AUTH=${CODE_SERVER_AUTH:-none}
      - CODE_SERVER_HOST=127.0.0.1
      - CODE_SERVER_PORT=8081
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_here}
      - SESSION_SECRET=${SESSION_SECRET:-your_session_secret_key_here}
      - AI_PROVIDER=${AI_PROVIDER:-opencode}
      - MCP_SERVER_ENABLED=${MCP_SERVER_ENABLED:-true}
      - MCP_SERVER_HOST=${MCP_SERVER_HOST:-localhost}
      - MCP_SERVER_PORT=${MCP_SERVER_PORT:-8082}
      - FILE_UPLOAD_SIZE_LIMIT=${FILE_UPLOAD_SIZE_LIMIT:-10485760}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    networks:
      - mobile-code-server-net
    depends_on:
      - redis
      - postgres

  # Redis - For sessions and real-time features
  redis:
    image: redis:alpine
    container_name: mobile-code-server-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mobile-code-server-net
    command: redis-server --requirepass ${REDIS_PASSWORD:-}

  # PostgreSQL - For persistent data
  postgres:
    image: postgres:15-alpine
    container_name: mobile-code-server-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-mobile_code_server}
    restart: unless-stopped
    networks:
      - mobile-code-server-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mobile_code_server}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MCP Server - Model Context Protocol Server
  mcp-server:
    image: mcp-server:latest
    container_name: mobile-code-server-mcp
    ports:
      - "8082:8082"
    volumes:
      - ./mcp:/app/mcp
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8082
    restart: unless-stopped
    networks:
      - mobile-code-server-net
    profiles:
      - mcp

  # Nginx - Reverse Proxy and Load Balancer
  nginx:
    image: nginx:alpine
    container_name: mobile-code-server-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - mobile-code-server
    restart: unless-stopped
    networks:
      - mobile-code-server-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Code Server - The actual VS Code server
  code-server:
    image: codercom/code-server:latest
    container_name: mobile-code-server-code-server
    ports:
      - "8081:8081"
    volumes:
      - ./project:/home/coder/project:cached
      - ./data:/home/coder/.local/share/code-server:cached
      - ./config:/home/coder/.config/code-server:cached
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:-}
      - SUDO_PASSWORD=${CODE_SERVER_SUDO_PASSWORD:-}
      - AUTH_TYPE=${CODE_SERVER_AUTH:-none}
      - DISABLE_TELEMETRY=true
    restart: unless-stopped
    networks:
      - mobile-code-server-net

  # Admin Panel - For managing the application
  admin-panel:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    container_name: mobile-code-server-admin
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - API_URL=http://mobile-code-server:8080
    depends_on:
      - mobile-code-server
    restart: unless-stopped
    networks:
      - mobile-code-server-net
    profiles:
      - admin

  # File Upload Service
  file-upload:
    build:
      context: .
      dockerfile: docker/Dockerfile.file-upload
    container_name: mobile-code-server-file-upload
    ports:
      - "3002:3002"
    environment:
      - FILE_UPLOAD_SIZE_LIMIT=${FILE_UPLOAD_SIZE_LIMIT:-10485760}
      - FILE_UPLOAD_TYPES=${FILE_UPLOAD_TYPES:-image/*,application/*,text/*}
      - STORAGE_PATH=/uploads
    volumes:
      - ./uploads:/uploads
    restart: unless-stopped
    networks:
      - mobile-code-server-net
    profiles:
      - file-upload

# Volumes for persistent data
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

# Networks
networks:
  mobile-code-server-net:
    driver: bridge
    name: mobile-code-server-net