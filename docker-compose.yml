version: '3.8'

services:
  # Mobile Code Server - Main Application
  mobile-code-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mobile-code-server
    ports:
      - "8080:8080"
    volumes:
      - project-data:/home/coder/project
      - code-server-data:/home/coder/.local/share/code-server
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - CODE_SERVER_INTERNAL_PORT=3000
    restart: unless-stopped
    networks:
      - mobile-code-server-net

# Volumes for persistent data
volumes:
  project-data:
    driver: local
  code-server-data:
    driver: local

# Networks
networks:
  mobile-code-server-net:
    driver: bridge
    name: mobile-code-server-net
